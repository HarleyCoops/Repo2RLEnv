name: Release

# Triggered when a GitHub Release is published.
# Build the sdist + wheel, attach them to the Release, then publish to PyPI
# via OIDC (trusted publisher) — no API token needed in repo secrets.
#
# One-time PyPI setup (must be done by a project maintainer once, before the
# first run of this workflow can succeed):
#
#   1. Go to https://pypi.org/manage/project/repo2rlenv/settings/publishing/
#   2. Click "Add a new pending publisher" → fill in:
#        - PyPI Project Name: repo2rlenv
#        - Owner:             adithya-s-k
#        - Repository name:   Repo2RLEnv
#        - Workflow filename: release.yml
#        - Environment:       pypi
#   3. Save. From then on, any tag-triggered Release will publish.
#
# To cut a release:
#   git tag v0.3.0 && git push origin v0.3.0
#   gh release create v0.3.0 --generate-notes
# (or use the GitHub UI to draft + publish a release pointing at the tag).

on:
  release:
    types: [published]
  # Manual trigger — useful for re-running a failed publish after fixing the
  # trusted-publisher setup. Won't double-publish a version PyPI already has.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.3.0); must already exist"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Sanity gate — run the full test suite on the release tag before we publish.
  test:
    name: Tests on release tag (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - run: uv sync --group dev --frozen
      - run: uv run pytest -q

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Read package version
        id: read-version
        run: |
          version=$(uv run python -c "from importlib.metadata import version; print(version('repo2rlenv'))" 2>/dev/null \
                    || grep -E '^version = ' pyproject.toml | head -1 | cut -d'"' -f2)
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Package version: $version"

      - name: Verify tag matches package version
        run: |
          tag="${{ github.event.release.tag_name || inputs.tag }}"
          expected="v${{ steps.read-version.outputs.version }}"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Release tag $tag does not match package version $expected — bump pyproject.toml first"
            exit 1
          fi

      - name: Build distributions
        run: |
          rm -rf dist/
          uv build

      - name: Verify wheel installs cleanly
        run: |
          uv venv /tmp/check-install
          uv pip install --python /tmp/check-install/bin/python dist/*.whl
          /tmp/check-install/bin/repo2rlenv --version

      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI (trusted publisher)
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: pypi
      url: https://pypi.org/p/repo2rlenv
    # Trusted-publishing requires id-token: write so GH issues the OIDC token
    # PyPI uses to verify this workflow against the registered publisher.
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: release-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted publisher: no `password` field — OIDC handles it
          packages-dir: dist/
          # Skip if PyPI already has this version (allows re-runs after fix)
          skip-existing: true
          print-hash: true

  attach-to-release:
    name: Attach sdist + wheel to GitHub Release
    runs-on: ubuntu-latest
    # Only on actual release events; the workflow_dispatch path skips this
    if: github.event_name == 'release'
    needs: [build, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: release-dist
          path: dist/

      - name: Upload distribution files to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --clobber
